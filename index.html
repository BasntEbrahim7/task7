<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <h2>Loading Animation</h2>
  <div class="loading">
    <div class="dot1"></div>
    <div class="dot2"></div>
    <div class="dot3"></div>
  </div>

  <br><br><hr><br>

  <h2>Interactive Product Card</h2>
  <div class="card">
    <div class="card-content">
      <div class="image-container">
        <img src="https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/MQTP3?wid=1144&hei=1144&fmt=jpeg&qlt=90&.v=1687660671182" alt="Product 1">
        <div class="overlay">New Arrival</div>
      </div>
      <h3>headphone</h3>
      <p>black wireless headphones</p>
      <span class="price">$199.99</span>
      <button class="card-btn">add to cart</button>
    </div>
  </div>

  <br><br><hr><br>

  <h2>Clock</h2>
  <div class="clock">
    <div class="hour"></div> 
    <div class="minute"></div>  
  </div>

</body>
</html>
